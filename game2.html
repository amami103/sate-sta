<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google AdSense 共通スクリプト -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6887981844690617" crossorigin="anonymous"></script>

    <link rel="icon" href="logo2.png">
    <link rel="apple-touch-icon" href="logo2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズプレイ | サテステ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-container { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 0; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.3); width: 320px; max-height: 85vh; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        
        /* ヘッダー色：青 */
        .ui-header { background: #007AFF; color: white; padding: 12px; cursor: move; font-size: 13px; text-align: center; border-top-left-radius: 12px; border-top-right-radius: 12px; user-select: none; flex-shrink: 0; font-weight: bold; }
        .ui-header::after { content: ' (ドラッグで移動)'; font-size: 10px; font-weight: normal; opacity: 0.8; }
        
        .ui-content { padding: 15px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        
        /* 広告用スタイル */
        .ad-container { margin: 10px 0; text-align: center; background: #fafafa; border-radius: 4px; overflow: hidden; min-height: 60px; font-size: 10px; color: #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #eee; }
        .ad-label { font-size: 8px; color: #999; margin-bottom: 2px; display: block; width: 100%; text-align: center; border-bottom: 1px solid #eee; background: #fdfdfd; }

        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
        input { padding: 12px; font-size: 16px; width: 100%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; }
        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 15px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; font-size: 15px; }
        .btn-hint   { background: #5856D6; font-size: 10px; }
        .btn-fullscreen { background: #444; grid-column: span 2; margin-bottom: 5px; font-size: 11px; opacity: 0.8; }
        
        #hint-area { margin-top: 10px; font-size: 12px; color: #444; background: #f0f0f0; border-radius: 6px; padding: 10px; display: none; border-left: 4px solid #5856D6; }
        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; min-height: 1.5em; line-height: 1.4; }

        /* リザルトリスト(game.htmlスタイル) */
        .result-list { list-style: none; padding: 0; margin: 10px 0; }
        .result-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .res-status { width: 25px; text-align: center; font-size: 18px; flex-shrink: 0; padding-top: 2px; }
        .res-info { flex-grow: 1; margin-left: 10px; text-align: left; overflow: hidden; }
        .res-name { font-weight: bold; color: #333; display: block; font-size: 14px; margin-bottom: 2px; }
        .res-user-ans { font-size: 11px; color: #666; display: block; }
        .res-sub { font-size: 10px; color: #999; display: block; margin-top: 2px; }
        .res-detail-label { font-size: 11px; color: #007AFF; font-weight: bold; display: block; margin-top: 5px; }
        .btn-view { background: #5ac8fa; padding: 6px 10px; font-size: 11px; width: auto; color: white; border-radius: 4px; border: none; flex-shrink: 0; margin-left: 5px; }

        .final-score { font-size: 32px; color: #d33; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .total-time-display { font-size: 16px; color: #444; text-align: center; font-weight: bold; margin-bottom: 15px; }

        .sns-share-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .btn-sns { padding: 10px 0; font-size: 9px; display: flex; align-items: center; justify-content: center; gap: 2px; text-decoration: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-x { background: #000; }
        .btn-line { background: #06C755; }
        .btn-threads { background: #000; border: 1px solid #333; }
        .btn-fb { background: #555; }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .btn-card { background: #5856D6; grid-column: span 3; font-size: 13px; padding: 12px; margin-top: 5px; }

        #image-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #share-image-container { max-width: 90%; max-height: 80%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,1); position: relative; }
        #share-image-container img { width: 100%; height: auto; display: block; }
        .overlay-close { margin-top: 15px; background: white; color: black; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        .result-footer-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .result-footer-buttons button { flex: 1; padding: 12px 5px; }

        @media (max-width: 600px) {
            .btn-fullscreen { display: none; }
            .ui-container { width: 100%; left: 0 !important; bottom: 0 !important; top: auto !important; border-radius: 20px 20px 0 0; max-height: 70vh; }
            .ui-header { cursor: pointer; padding: 14px; }
            .ui-container.minimized { transform: translateY(calc(100% - 46px)); }
        }
    </style>
</head>
<body onload="init()">
    <div id="map"></div>
    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header" onclick="handleHeaderClick()">サテステ</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">準備中...</h2>
            <div id="game-ui">
                <input list="station-list" id="station-input" placeholder="駅名を入力..." autocomplete="off">
                <datalist id="station-list"></datalist>
                <div class="button-group">
                    <button class="btn-fullscreen" onclick="toggleFullscreen()">全画面 切替</button>
                    <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                    <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                    <button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
                    <button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
                    <button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
                    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>
                </div>
                <div id="hint-area"></div>
                <div id="result"></div>
            </div>
            <div id="final-ui" style="display:none;"></div>
        </div>
    </div>

    <div id="image-overlay">
        <div id="share-image-container"></div>
        <p style="color:white; font-size:12px; margin-top:10px; text-align:center;">画像を保存してシェアしてください</p>
        <button class="overlay-close" onclick="closeOverlay()">閉じる</button>
    </div>

    <script>
        function refreshAds() { try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {} }

        const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
        const COMPANY_GROUPS = { "大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道","名古屋鉄道","近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄","西日本鉄道"], "関東大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道"], "関西大手私鉄": ["近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄"], "地下鉄": ["札幌市交通局","仙台市交通局","東京都交通局","東京メトロ","横浜市交通局","名古屋市交通局","京都市交通局","Osaka Metro","神戸市交通局","福岡市交通局"], "JR": ["JR北海道","JR東日本","JR東海","JR西日本","JR四国","JR九州"]};

        let gameStations = [], currentStation = null, map, score = 0, questionCount = 0, totalQuestions = 10, answered = false, playHistory = [], startTime = 0, isLocked = false;
        let allUniqueStations = [], allStationLabels = []; 
        let inputTimer, isComposing = false;

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else if (document.exitFullscreen) document.exitFullscreen(); }
        function handleHeaderClick() { if (window.innerWidth <= 600) document.getElementById('ui-panel').classList.toggle('minimized'); }
        function expandPanel() { document.getElementById('ui-panel').classList.remove('minimized'); }

        function init() {
            const params = new URLSearchParams(window.location.search);
            isLocked = params.get('lock') === 'true';
            map = L.map('map', { zoomControl:false, dragging:!isLocked, touchZoom:!isLocked, doubleClickZoom:!isLocked, scrollWheelZoom:!isLocked, boxZoom:!isLocked, keyboard:!isLocked });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '&copy; 国土地理院' }).addTo(map);

            if (typeof stations === 'undefined') return;
            const stationMap = new Map();
            stations.forEach(s => {
                const key = `${s.name}_${s.lat.toFixed(3)}_${s.lng.toFixed(3)}`;
                if (stationMap.has(key)) {
                    const ex = stationMap.get(key); if (!ex.line.includes(s.line)) ex.line += `・${s.line}`;
                } else {
                    const copy = { ...s }; stationMap.set(key, copy); allUniqueStations.push(copy);
                }
            });

            const nameCounts = {};
            allUniqueStations.forEach(s => { nameCounts[s.name] = (nameCounts[s.name] || 0) + 1; });
            allStationLabels = allUniqueStations.map(s => {
                const label = (nameCounts[s.name] > 1) ? `${s.name} (${s.pref} / ${s.line})` : s.name;
                s.fullLabel = label; return label;
            }).sort();

            const inputEl = document.getElementById('station-input');
            inputEl.addEventListener('compositionstart', () => { isComposing = true; });
            inputEl.addEventListener('compositionend', () => { isComposing = false; updateDatalist(); });
            inputEl.addEventListener('input', () => { if (isComposing) return; clearTimeout(inputTimer); inputTimer = setTimeout(updateDatalist, 150); });
            inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { if (isComposing) return; e.preventDefault(); checkAnswer(); } });

            let filtered = [...allUniqueStations];
            const sPref = params.get('pref'), sComp = params.get('company'), sComps = params.get('comps'), sLine = params.get('line'), sLines = params.get('lines');
            const splitParam = (value) => {
                if (!value || value === "all") return [];
                return value.split(',').map(v => v.trim()).filter(Boolean);
            };
            const stationKey = (s) => `${s.name}_${Number(s.lat).toFixed(3)}_${Number(s.lng).toFixed(3)}`;
            const matchValue = (stationValue, selectedValue) => {
                if (!stationValue || !selectedValue) return false;
                return stationValue === selectedValue || stationValue.includes(selectedValue) || selectedValue.includes(stationValue);
            };

            let rawFiltered = stations.slice();

            const selectedPrefs = splitParam(sPref);
            if (selectedPrefs.length > 0) {
                let prefNames = [];
                selectedPrefs.forEach(p => {
                    if (p.startsWith("reg:")) {
                        const regName = p.replace("reg:", "");
                        prefNames.push(...(REGION_PREFS[regName] || []));
                    } else {
                        prefNames.push(p);
                    }
                });
                prefNames = Array.from(new Set(prefNames));
                rawFiltered = rawFiltered.filter(s => prefNames.includes(s.pref));
            }

            if (sComp && sComp !== "all") {
                if (sComp.startsWith("grp:")) {
                    const groupName = sComp.replace("grp:", "");
                    const gr = COMPANY_GROUPS[groupName] || [];
                    rawFiltered = rawFiltered.filter(s => gr.some(c => matchValue(s.company, c)) || matchValue(s.company, groupName));
                } else {
                    rawFiltered = rawFiltered.filter(s => matchValue(s.company, sComp));
                }
            }

            const selectedComps = splitParam(sComps);
            if (selectedComps.length > 0) {
                rawFiltered = rawFiltered.filter(s => selectedComps.some(c => matchValue(s.company, c)));
            }

            const selectedLines = [...splitParam(sLine), ...splitParam(sLines)];
            if (selectedLines.length > 0) {
                const uniqueLines = Array.from(new Set(selectedLines));
                rawFiltered = rawFiltered.filter(s => uniqueLines.some(l => matchValue(s.line, l)));
            }

            const allowedKeys = new Set(rawFiltered.map(stationKey));
            filtered = allUniqueStations.filter(s => allowedKeys.has(stationKey(s)));

            for(let i=filtered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filtered[i],filtered[j]]=[filtered[j],filtered[i]]}
            gameStations = filtered.slice(0, parseInt(params.get('num')) || 10);
            if (gameStations.length === 0) { alert("該当する駅がありません。条件を変更してください。"); location.href = "index.html"; return; }
            totalQuestions = gameStations.length;
            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function updateDatalist() {
            const val = document.getElementById('station-input').value.toLowerCase(), dl = document.getElementById('station-list');
            if (val.length < 1) { dl.innerHTML = ""; return; }
            const frag = document.createDocumentFragment(); let count = 0;
            for (const label of allStationLabels) {
                if (label.split(' (')[0].toLowerCase().startsWith(val)) {
                    const o = document.createElement('option'); o.value = label; frag.appendChild(o);
                    if (++count >= 100) break;
                }
            }
            dl.innerHTML = ""; dl.appendChild(frag);
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) { showFinalResult(); return; }
            answered = false;
            document.getElementById('answer-btn').style.display = "block"; document.getElementById('next-btn').style.display = "none";
            document.getElementById('result').innerText = ""; document.getElementById('station-input').value = "";
            document.getElementById('station-list').innerHTML = ""; document.getElementById('hint-area').style.display = "none";
            currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${totalQuestions} 問`;
            startTime = Date.now();
        }

        function showHint(t) { if(!answered){ const a = document.getElementById('hint-area'); a.style.display = "block"; a.innerText = (t==='pref'?"都道府県: ":"路線名: ")+(currentStation[t]||"不明"); } }
        function resetView() { if(currentStation) map.flyTo([currentStation.lat, currentStation.lng], 17); }

        function checkAnswer() {
            if (answered) return; expandPanel();
            const time = (Date.now() - startTime) / 1000, userRaw = document.getElementById('station-input').value.trim(), user = userRaw.split(' (')[0];
            const res = document.getElementById('result'), isCorrect = (user === currentStation.name);
            
            let dist = null;
            let userStation = allUniqueStations.find(s => s.fullLabel === userRaw);
            if (!userStation && userRaw !== "") userStation = allUniqueStations.find(s => s.name === user);
            if (userStation) dist = getDistance(currentStation.lat, currentStation.lng, userStation.lat, userStation.lng);

            // 回答直後の表示（正解駅の県名・路線名を表示）
            const infoDisplay = `<div style="font-size:11px; color:#666;">正解駅: ${currentStation.pref} / ${currentStation.line}</div>`;
            const distDisplay = `<div style="font-size: 13px; color: #444; margin-top: 5px;">誤差: ${!userRaw ? '-' : (dist ? dist.toFixed(2) + 'km' : '0.00km')} / ${time.toFixed(1)}秒</div>`;

            if (isCorrect) { res.innerHTML = `<span style='color:#D33;'>正解！</span>` + infoDisplay + distDisplay; score++; }
            else { res.innerHTML = `<span style='color:#007AFF;'>不正解！正解は「${currentStation.name}」</span>` + infoDisplay + distDisplay; }
            
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, lat: currentStation.lat, lng: currentStation.lng, isCorrect, time, userAns: userRaw || "(未入力)", dist: dist });
            finishOne();
        }

        function showAnswer() {
            if (answered) return; expandPanel();
            const time = (Date.now() - startTime) / 1000, userRaw = document.getElementById('station-input').value.trim();
            document.getElementById('result').innerHTML = `正解: <span style='color:#E60;'>${currentStation.name}</span><br><div style="font-size:11px; color:#666;">${currentStation.pref} / ${currentStation.line}</div>`;
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, lat: currentStation.lat, lng: currentStation.lng, isCorrect: false, time, userAns: userRaw || "ギブアップ", dist: null });
            finishOne();
        }

        function finishOne() { answered = true; document.getElementById('answer-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block"; questionCount++; }
        function jumpToStation(la, ln) { map.dragging.enable(); map.scrollWheelZoom.enable(); map.flyTo([la, ln], 17); }
        function copyToClipboard(text) { const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert("文章をコピーしました！"); }

        function showFinalResult() {
            expandPanel(); document.getElementById('game-ui').style.display = "none";
            const finalUi = document.getElementById('final-ui'); finalUi.style.display = "block";
            let totalT = 0, listH = '<ul class="result-list">';
            
            playHistory.forEach((h) => {
                totalT += h.time;
                const mark = h.isCorrect ? '●' : '×', mc = h.isCorrect ? '#D33' : '#007AFF';
                const distStr = (h.userAns === "(未入力)" || h.userAns === "ギブアップ" || h.dist === null) ? '-' : h.dist.toFixed(1) + 'km';
                listH += `
                <li class="result-item">
                    <div class="res-status" style="color:${mc}">${mark}</div>
                    <div class="res-info">
                        <span class="res-name">${h.name}</span>
                        <span class="res-user-ans">解答: ${h.userAns}</span>
                        <span class="res-sub">${h.pref} / ${h.line}</span>
                        <span class="res-detail-label">誤差: ${distStr} | ${h.time.toFixed(1)}秒</span>
                    </div>
                    <button class="btn-view" onclick="jumpToStation(${h.lat}, ${h.lng})">確認</button>
                </li>`;
            });
            
            const mt = Math.floor(totalT / 60), st = (totalT % 60).toFixed(1), timeStr = mt > 0 ? mt + '分' + st + '秒' : st + '秒';
            const shareText = `「サテステ」で ${totalQuestions}問中 ${score}問正解しました！\n総解答時間: ${timeStr}\n#サテステ https://sate-sta.com`;
            
            finalUi.innerHTML = `
                <div class="final-score">${totalQuestions}問中 ${score}問正解！</div>
                <div class="total-time-display">総解答時間: ${timeStr}</div>
                <div class="sns-share-area">
                    <button class="btn-sns btn-x" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}')">𝕏で投稿</button>
                    <button class="btn-sns btn-line" onclick="window.open('https://line.me/R/msg/text/?${encodeURIComponent(shareText)}')">LINE</button>
                    <button class="btn-sns btn-threads" onclick="window.open('https://www.threads.net/intent/post?text=${encodeURIComponent(shareText)}')">Threads</button>
                    <button class="btn-sns btn-fb" onclick="copyToClipboard('${shareText}')">文章コピー</button>
                    <button class="btn-sns btn-insta" onclick="copyToClipboard('${shareText}')">Insta用</button>
                    <button class="btn-sns btn-card" onclick="generateResultCard()">画像で結果をシェア！</button>
                </div>
                <div class="ad-container"><span class="ad-label">Sponsor</span><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6887981844690617" data-ad-slot="6887981844690617" data-ad-format="horizontal"></ins></div>
                ${listH + '</ul>'}
                <div class="result-footer-buttons">
                    <button class="btn-next" style="margin:0;" onclick="location.reload()">もう一度</button>
                    <button class="btn-reset" onclick="location.href='index.html'">タイトルへ</button>
                </div>`;
            setTimeout(() => { finalUi.querySelectorAll('.adsbygoogle').forEach(() => refreshAds()); }, 100);
        }

        async function generateResultCard() {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 1400;
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#007AFF"; ctx.fillRect(0, 0, canvas.width, 120);
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center"; ctx.fillText("サテステ リザルトカード", 400, 75);
            ctx.fillStyle = "#D33"; ctx.font = "bold 80px sans-serif"; ctx.fillText(`${totalQuestions}問中 ${score}問正解！`, 400, 260);
            ctx.strokeStyle = "#eeeeee"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(50, 320); ctx.lineTo(750, 320); ctx.stroke();
            let y = 380;
            playHistory.slice(0, 10).forEach((h, i) => {
                const mark = h.isCorrect ? '●' : '×', mc = h.isCorrect ? '#D33' : '#007AFF';
                ctx.textAlign = "left"; ctx.fillStyle = mc; ctx.font = "bold 30px sans-serif"; ctx.fillText(mark, 50, y);
                ctx.fillStyle = "#333333"; ctx.font = "bold 24px sans-serif"; ctx.fillText(`${i + 1}. ${h.name}`, 95, y, 600);
                ctx.fillStyle = "#666666"; ctx.font = "18px sans-serif"; ctx.fillText(`解答: ${h.userAns} (${h.pref} / ${h.line})`, 95, y + 30, 650);
                ctx.textAlign = "right"; ctx.fillStyle = "#007AFF"; ctx.font = "bold 20px sans-serif"; 
                const d = (h.userAns === "(未入力)" || h.userAns === "ギブアップ" || h.dist === null) ? '-' : h.dist.toFixed(1) + 'km';
                ctx.fillText(`${d} / ${h.time.toFixed(1)}s`, 750, y + 15);
                y += 92;
            });
            ctx.fillStyle = "#f8f8f8"; ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = "#999999"; ctx.font = "18px sans-serif"; ctx.textAlign = "center"; ctx.fillText("sate-ste.com | サテステ", 400, canvas.height - 18);
            document.getElementById('share-image-container').innerHTML = `<img src="${canvas.toDataURL("image/png")}">`;
            document.getElementById('image-overlay').style.display = "flex";
        }

        function closeOverlay() { document.getElementById('image-overlay').style.display = "none"; }
        function makeDraggable(el) {
            if (window.innerWidth <= 600) return;
            const h = document.getElementById("ui-header"); let p1=0, p2=0, p3=0, p4=0;
            h.onmousedown = (e) => {
                e.preventDefault(); p3 = e.clientX; p4 = e.clientY; el.style.transition = "none";
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; el.style.transition = "transform 0.3s ease"; };
                document.onmousemove = (e) => { e.preventDefault(); p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY; el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.bottom = "auto"; };
            }
        }
    </script>
