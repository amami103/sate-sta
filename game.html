<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="logo2.png">
    <link rel="apple-touch-icon" href="logo2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズプレイ | サテステ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-container { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 0; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.3); width: 320px; max-height: 85vh; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .ui-header { background: #007AFF; color: white; padding: 12px; cursor: move; font-size: 13px; text-align: center; border-top-left-radius: 12px; border-top-right-radius: 12px; user-select: none; flex-shrink: 0; font-weight: bold; }
        .ui-header::after { content: ' (ドラッグで移動)'; font-size: 10px; font-weight: normal; opacity: 0.8; }
        .ui-content { padding: 15px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
        input { padding: 12px; font-size: 16px; width: 100%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; }
        button:active { opacity: 0.7; }
        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 15px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; font-size: 15px; }
        .btn-hint   { background: #5856D6; font-size: 10px; }
        .btn-fullscreen { background: #444; grid-column: span 2; margin-bottom: 5px; font-size: 11px; opacity: 0.8; }
        #hint-area { margin-top: 10px; font-size: 12px; color: #444; background: #f0f0f0; border-radius: 6px; padding: 10px; display: none; border-left: 4px solid #5856D6; }
        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; min-height: 1.5em; line-height: 1.4; }
        .result-list { list-style: none; padding: 0; margin: 10px 0; }
        .result-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .res-info { flex-grow: 1; margin-left: 10px; text-align: left; }
        .res-name { font-weight: bold; color: #333; display: block; font-size: 13px; }
        .res-user-ans { font-size: 11px; color: #666; display: block; }
        .res-sub { font-size: 10px; color: #999; display: block; }
        .res-score-detail { font-size: 10px; color: #007AFF; font-weight: bold; }
        .res-status { width: 25px; text-align: center; font-size: 16px; }
        .btn-view { background: #5ac8fa; padding: 6px 10px; font-size: 11px; width: auto; color: white; border-radius: 4px; border: none; }
        .final-score { font-size: 32px; color: #d33; font-weight: bold; text-align: center; margin-bottom: 2px; }
        .final-rank { font-size: 18px; color: #444; text-align: center; font-weight: bold; margin-bottom: 10px; }
        .ad-box { background: #fdfdfd; border: 1px solid #eee; padding: 10px; text-align: center; font-size: 10px; color: #999; margin: 10px 0; }
        @media (max-width: 600px) { .btn-fullscreen { display: none; } .ui-container { width: 100%; left: 0 !important; bottom: 0 !important; top: auto !important; border-radius: 20px 20px 0 0; max-height: 70vh; } .ui-header { cursor: pointer; padding: 14px; } .ui-container.minimized { transform: translateY(calc(100% - 46px)); } .ui-header::after { content: ' (タップで開閉)'; font-size: 10px; font-weight: normal; opacity: 0.8; } }
    </style>
</head>
<body onload="init()">
    <div id="map"></div>
    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header" onclick="handleHeaderClick()">サテステ</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">準備中...</h2>
            <div id="game-ui">
                <input list="station-list" id="station-input" placeholder="駅名を入力..." autocomplete="off">
                <datalist id="station-list"></datalist>
                <div class="button-group">
                    <button class="btn-fullscreen" onclick="toggleFullscreen()">全画面 切替</button>
                    <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                    <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                    <button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
                    <button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
                    <button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
                    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>
                </div>
                <div id="hint-area"></div>
                <div id="result"></div>
                <div class="ad-box">スポンサーリンク</div>
            </div>
            <div id="final-ui" style="display:none;"></div>
        </div>
    </div>

    <script>
        const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
        const COMPANY_GROUPS = { "大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道","名古屋鉄道","近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄","西日本鉄道"], "関東大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道"], "関西大手私鉄": ["近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄"], "地下鉄": ["札幌市交通局","仙台市交通局","東京都交通局","東京メトロ","横浜市交通局","名古屋市交通局","京都市交通局","Osaka Metro","神戸市交通局","福岡市交通局"], "JR": ["JR北海道","JR東日本","JR東海","JR西日本","JR四国","JR九州"]};

        let gameStations = [], currentStation = null, map, totalScore = 0, questionCount = 0, answered = false, playHistory = [], startTime = 0, isLocked = false;
        let allStationLabels = [], allUniqueStations = [], usedHints = { pref: false, line: false };

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function handleHeaderClick() { if (window.innerWidth <= 600) document.getElementById('ui-panel').classList.toggle('minimized'); }

        function init() {
            const params = new URLSearchParams(window.location.search);
            isLocked = params.get('lock') === 'true';
            map = L.map('map', { zoomControl:false, dragging:!isLocked, touchZoom:!isLocked, doubleClickZoom:!isLocked, scrollWheelZoom:!isLocked, boxZoom:!isLocked, keyboard:!isLocked });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '&copy; 国土地理院' }).addTo(map);

            if (typeof stations === 'undefined') return;

            const stationMap = new Map();
            stations.forEach(s => {
                const key = `${s.name}_${s.lat.toFixed(3)}_${s.lng.toFixed(3)}`;
                if (stationMap.has(key)) {
                    const existing = stationMap.get(key);
                    if (!existing.line.includes(s.line)) existing.line += `・${s.line}`;
                } else {
                    const copy = { ...s };
                    stationMap.set(key, copy);
                    allUniqueStations.push(copy);
                }
            });

            const nameCounts = {};
            allUniqueStations.forEach(s => { nameCounts[s.name] = (nameCounts[s.name] || 0) + 1; });
            allStationLabels = allUniqueStations.map(s => (nameCounts[s.name] > 1) ? `${s.name} (${s.pref} / ${s.line})` : s.name).sort();

            document.getElementById('station-input').addEventListener('input', updateDatalist);

            let filtered = [...allUniqueStations];
            const mPrefs = params.get('prefs') ? params.get('prefs').split(',') : null;
            const sPref = params.get('pref');
            if (mPrefs) filtered = filtered.filter(s => mPrefs.includes(s.pref));
            else if (sPref && sPref !== "all") {
                if (sPref.startsWith("reg:")) {
                    const reg = REGION_PREFS[sPref.replace("reg:", "")] || [];
                    filtered = filtered.filter(s => reg.includes(s.pref));
                } else filtered = filtered.filter(s => s.pref === sPref);
            }
            const mComps = params.get('comps') ? params.get('comps').split(',') : null;
            const sComp = params.get('company');
            if (mComps) filtered = filtered.filter(s => mComps.includes(s.company));
            else if (sComp && sComp !== "all") {
                if (sComp.startsWith("grp:")) {
                    const grp = COMPANY_GROUPS[sComp.replace("grp:", "")] || [];
                    filtered = filtered.filter(s => grp.includes(s.company));
                } else filtered = filtered.filter(s => s.company === sComp);
            }
            const mLines = params.get('lines') ? params.get('lines').split(',') : null;
            const sLine = params.get('line');
            if (mLines) filtered = filtered.filter(s => mLines.includes(s.line));
            else if (sLine && sLine !== "all") filtered = filtered.filter(s => s.line === sLine);

            for(let i=filtered.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [filtered[i],filtered[j]]=[filtered[j],filtered[i]]; }
            gameStations = filtered.slice(0, parseInt(params.get('num')) || 10);
            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function updateDatalist() {
            const val = document.getElementById('station-input').value.toLowerCase();
            const dl = document.getElementById('station-list');
            if (val.length < 1) { dl.innerHTML = ""; return; }
            const frag = document.createDocumentFragment();
            let count = 0;
            for (const label of allStationLabels) {
                if (label.toLowerCase().startsWith(val)) {
                    const o = document.createElement('option'); o.value = label; frag.appendChild(o);
                    if (++count >= 100) break;
                }
            }
            dl.innerHTML = ""; dl.appendChild(frag);
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) { showFinalResult(); return; }
            answered = false; usedHints = { pref: false, line: false };
            document.getElementById('answer-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('result').innerText = "";
            document.getElementById('station-input').value = "";
            document.getElementById('hint-area').style.display = "none";
            currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${gameStations.length} 問`;
            startTime = Date.now();
        }

        function showHint(t) {
            if(!answered){
                usedHints[t] = true;
                const a = document.getElementById('hint-area');
                a.style.display = "block";
                const content = t === 'pref' ? `都道府県: ${currentStation.pref}` : `路線名: ${currentStation.line}`;
                if (!a.innerHTML.includes(content)) a.innerHTML = (a.innerHTML ? a.innerHTML + "<br>" : "") + content;
            }
        }

        function checkAnswer() {
            if (answered) return;
            const time = (Date.now() - startTime) / 1000;
            const userRaw = document.getElementById('station-input').value.trim();
            const userName = userRaw.split(' (')[0];
            
            let baseScore = 0;
            let timeBonus = 0;
            let dist = 999;
            let isCorrect = false;

            if (userName !== "") {
                const found = allUniqueStations.find(s => s.name === userName);
                const userCoords = found ? { lat: found.lat, lng: found.lng } : null;
                dist = userCoords ? getDistance(currentStation.lat, currentStation.lng, userCoords.lat, userCoords.lng) : 999;
                isCorrect = (userName === currentStation.name);

                if (isCorrect) {
                    baseScore = 1500;
                } else {
                    baseScore = Math.max(0, 1000 * (1 - Math.sqrt(Math.min(dist, 50) / 50)));
                }

                if (!usedHints.pref && !usedHints.line) {
                    timeBonus = Math.max(0, 500 - (Math.max(0, time - 10) * 10));
                }
            }

            let multiplier = 1.0;
            if (usedHints.pref && usedHints.line) multiplier = 0.1;
            else if (usedHints.line) multiplier = 0.25;
            else if (usedHints.pref) multiplier = 0.5;

            const questionScore = Math.round((baseScore + timeBonus) * multiplier);
            totalScore += questionScore;

            const res = document.getElementById('result');
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;
            const distDisplay = (userName !== "" && !isCorrect) ? `<div style="font-size: 11px; color: #E60;">誤差: ${dist.toFixed(2)}km</div>` : "";

            res.innerHTML = `<div style="font-size:12px; color:#555;">あなたの解答: ${userRaw || "(未入力)"}</div>` +
                            `<span style="color:${isCorrect ? '#D33' : '#007AFF'};">${isCorrect ? '正解！' : '正解は「'+currentStation.name+'」'}</span>` +
                            infoText + distDisplay +
                            `<div style="font-size:16px; color:#E60; font-weight:bold; margin-top:5px;">+${questionScore.toLocaleString()}点</div>` +
                            `<div style="font-size:10px; color:#888;">(基礎:${Math.round(baseScore)} + タイム:${Math.round(timeBonus)}) × 倍率:${multiplier}</div>`;

            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, userAns: userRaw, isCorrect, dist, score: questionScore, lat: currentStation.lat, lng: currentStation.lng });
            answered = true;
            document.getElementById('answer-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            questionCount++;
        }

        function showAnswer() {
            if (answered) return;
            const res = document.getElementById('result');
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;
            res.innerHTML = `<span style="color:#FF9500;">正解は「${currentStation.name}」</span>` + infoText + `<div style="font-size:16px; font-weight:bold; margin-top:5px;">+0点</div>`;
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, userAns: "ギブアップ", isCorrect: false, dist: 999, score: 0, lat: currentStation.lat, lng: currentStation.lng });
            answered = true;
            document.getElementById('answer-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            questionCount++;
        }

        function showFinalResult() {
            document.getElementById('game-ui').style.display = "none";
            document.getElementById('question-title').innerText = isLocked ? "結果発表 (ハードモード)" : "結果発表 (通常モード)";
            const finalUi = document.getElementById('final-ui');
            finalUi.style.display = "block";

            const maxPerQuestion = 2000;
            const totalMax = gameStations.length * maxPerQuestion;
            let rank = "D";
            const ratio = totalScore / (totalMax || 1);
            if (ratio >= 0.9) rank = "SSS";
            else if (ratio >= 0.8) rank = "SS";
            else if (ratio >= 0.7) rank = "S";
            else if (ratio >= 0.5) rank = "A";
            else if (ratio >= 0.3) rank = "B";
            else if (ratio >= 0.1) rank = "C";

            let listH = '<ul class="result-list">';
            playHistory.forEach(h => {
                const mark = h.isCorrect ? '●' : (h.dist < 5 ? '▲' : '×');
                const markColor = h.isCorrect ? 'red' : (h.dist < 5 ? 'orange' : 'blue');
                listH += `<li class="result-item"><div class="res-status" style="color:${markColor}">${mark}</div><div class="res-info"><span class="res-name">${h.name}</span><span class="res-user-ans">解答: ${h.userAns}</span><span class="res-sub">${h.pref} / ${h.line}</span><span class="res-score-detail">${h.score}点 / 誤差:${h.dist > 100 ? '-' : h.dist.toFixed(1)+'km'}</span></div><button class="btn-view" onclick="jumpToStation(${h.lat}, ${h.lng})">確認</button></li>`;
            });

            finalUi.innerHTML = `
                <div class="final-score">${totalScore.toLocaleString()} 点</div>
                <div class="final-rank">ランク: ${rank}</div>
                <div class="ad-box">スポンサーリンク</div>
                ${listH + '</ul>'}
                <div class="result-footer-buttons">
                    <button class="btn-next" style="background:#34C759; margin:0;" onclick="location.reload()">もう一度</button>
                    <button class="btn-reset" style="background:#8E8E93;" onclick="location.href='index.html'">タイトル</button>
                </div>
            `;
        }

        function jumpToStation(la, ln) {
            map.dragging.enable(); map.scrollWheelZoom.enable(); map.flyTo([la, ln], 17);
        }

        function resetView() { if(currentStation) map.flyTo([currentStation.lat, currentStation.lng], 17); }

        function makeDraggable(el) {
            if (window.innerWidth <= 600) return;
            const h = document.getElementById("ui-header");
            let p1=0, p2=0, p3=0, p4=0;
            h.onmousedown = (e) => {
                e.preventDefault(); p3 = e.clientX; p4 = e.clientY; el.style.transition = "none";
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; el.style.transition = "transform 0.3s ease"; };
                document.onmousemove = (e) => {
                    e.preventDefault(); p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.bottom = "auto";
                };
            }
        }
    </script>
</body>
</html>
