        .final-score { font-size: 32px; color: #d33; font-weight: bold; text-align: center; margin-bottom: 2px; }

        .score-record-box { background: #fff7ed; border: 1px solid #ffd3a3; border-radius: 10px; padding: 10px; margin: 10px 0 14px; color: #333; }
        .score-record-title { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
        .new-best-badge { background: #FF3B30; color: white; border-radius: 999px; padding: 3px 8px; font-size: 11px; }
        .score-record-condition { font-size: 10px; color: #777; margin-bottom: 8px; word-break: break-word; }

        .score-history-list { margin: 6px 0 0; padding-left: 18px; }
        .score-history-list li { margin: 4px 0; line-height: 1.4; }
        .btn-record-reset { background: #8E8E93; color: white; padding: 7px 10px; font-size: 10px; border-radius: 6px; margin-top: 8px; width: 100%; }

        .sns-share-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .btn-sns { padding: 10px 0; font-size: 9px; display: flex; align-items: center; justify-content: center; gap: 2px; text-decoration: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-x { background: #000; }

        #image-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }

        .result-footer-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .result-footer-buttons button { flex: 1; padding: 12px 5px; }

        @media (max-width: 600px) { .btn-fullscreen { display: none; } .ui-container { width: 100%; left: 0 !important; bottom: 0 !important; top: auto !important; border-radius: 20px 20px 0 0; max-height: 70vh; } .ui-header { cursor: pointer; padding: 14px; } .ui-container.minimized { transform: translateY(calc(100% - 46px)); } }

<body onload="init()">
<div id="map"></div>
<div class="ui-container" id="ui-panel">
<div class="ui-header" id="ui-header" onclick="handleHeaderClick()">サテステ (チャレンジ)</div>
<div class="ui-content" id="ui-content">

<h2 id="question-title">準備中...</h2>
<div id="game-ui">
<input autocomplete="off" id="station-input" list="station-list" placeholder="駅名を入力..."/>
<datalist id="station-list"></datalist>
<div class="button-group">
<button class="btn-fullscreen" onclick="toggleFullscreen()">全画面 切替</button>
<button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
<button class="btn-reset" onclick="resetView()">場所を戻す</button>
<button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
<button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
<button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
<button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>

</div>
<div id="hint-area"></div>
<div id="result"></div>
<!-- 広告枠2: ゲームUIの下 -->

</div>

</div>
</div>
<div id="image-overlay">
<div id="share-image-container"></div>
<p style="color:white; font-size:12px; margin-top:10px; text-align:center;">画像を保存してシェアしてください</p>

</div>
<script>
        // 広告読み込み用
        function refreshAds() {
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
        }

        const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
        const COMPANY_GROUPS = { "大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道","名古屋鉄道","近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄","西日本鉄道"], "関東大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道"], "関西大手私鉄": ["近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄"], "地下鉄": ["札幌市交通局","仙台市交通局","東京都交通局","東京メトロ","横浜市交通局","名古屋市交通局","京都市交通局","Osaka Metro","神戸市交通局","福岡市交通局"], "JR": ["JR北海道","JR東日本","JR東海","JR西日本","JR四国","JR九州"]};

        let gameStations = [], currentStation = null, map, totalScore = 0, questionCount = 0, answered = false, playHistory = [], startTime = 0, isLocked = false;
        let allUniqueStations = [], allStationLabels = [], usedHints = { pref: false, line: false };
        let maxDistancePenalty = 50, activeFilters = "全国";
        
                let localScoreSaved = false, lastScoreRecordState = null;
        let inputTimer; 
        let isComposing = false;

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function handleHeaderClick() { if (window.innerWidth <= 600) document.getElementById('ui-panel').classList.toggle('minimized'); }

        function init() {
            refreshAds();
            refreshAds();

            const params = new URLSearchParams(window.location.search);
            const resData = params.get('res');
            map = L.map('map', { zoomControl:false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '&copy; 国土地理院' }).addTo(map);

            if (resData) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(resData))));
                    playHistory = decoded.history; totalScore = decoded.score; isLocked = decoded.locked; activeFilters = decoded.filters || "全国";
                    setTimeout(() => { showFinalResult(true); generateResultCard(decoded.rank || "SSS", isLocked ? "ハード" : "通常", true); }, 200);
                    return;
                } catch(e) { console.error("Data error"); }
            }

            isLocked = params.get('lock') === 'true';
            if (isLocked) { map.dragging.disable(); map.touchZoom.disable(); map.doubleClickZoom.disable(); map.scrollWheelZoom.disable(); map.boxZoom.disable(); map.keyboard.disable(); }

            if (typeof stations === 'undefined') return;
            const stationMap = new Map();
            stations.forEach(s => {
                const key = `${s.name}_${s.lat.toFixed(3)}_${s.lng.toFixed(3)}`;
                if (stationMap.has(key)) {
                    const existing = stationMap.get(key);
                    if (!existing.line.includes(s.line)) existing.line += `・${s.line}`;
                } else {
                    const copy = { ...s }; stationMap.set(key, copy); allUniqueStations.push(copy);
                }
            });

            const nameCounts = {};
            allUniqueStations.forEach(s => { nameCounts[s.name] = (nameCounts[s.name] || 0) + 1; });
            allStationLabels = allUniqueStations.map(s => {
                const label = (nameCounts[s.name] > 1) ? `${s.name} (${s.pref} / ${s.line})` : s.name;
                s.fullLabel = label;
                return label;
            }).sort();
            
            const inputEl = document.getElementById('station-input');
            inputEl.addEventListener('compositionstart', () => { isComposing = true; });
            inputEl.addEventListener('compositionend', () => { isComposing = false; updateDatalist(); });
            inputEl.addEventListener('input', () => { if (isComposing) return; clearTimeout(inputTimer); inputTimer = setTimeout(updateDatalist, 150); });
            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (isComposing) return;
                    e.preventDefault(); 
                    checkAnswer();
                }
            });

            let filtered = [...allUniqueStations];
            const sPref = params.get('pref'), sComp = params.get('company'), sComps = params.get('comps'), sLine = params.get('line'), sLines = params.get('lines');
            const splitParam = (value) => {
                if (!value || value === "all") return [];
                return value.split(',').map(v => v.trim()).filter(Boolean);
            };
            const stationKey = (s) => `${s.name}_${Number(s.lat).toFixed(3)}_${Number(s.lng).toFixed(3)}`;
            const matchValue = (stationValue, selectedValue) => {
                if (!stationValue || !selectedValue) return false;
                return stationValue === selectedValue || stationValue.includes(selectedValue) || selectedValue.includes(stationValue);
            };

            let filterLabels = [];
            let penaltyValues = [];
            let rawFiltered = stations.slice();

            const selectedPrefs = splitParam(sPref);
            if (selectedPrefs.length > 0) {
                let prefNames = [];
                selectedPrefs.forEach(p => {
                    if (p.startsWith("reg:")) {
                        const regName = p.replace("reg:", "");
                        prefNames.push(...(REGION_PREFS[regName] || []));
                        filterLabels.push("地方: "+regName);
                        penaltyValues.push(45);
                    } else {
                        prefNames.push(p);
                        filterLabels.push("都道府県: "+p);
                        penaltyValues.push(25);
                    }
                });
                prefNames = Array.from(new Set(prefNames));
                rawFiltered = rawFiltered.filter(s => prefNames.includes(s.pref));
            }

            if (sComp && sComp !== "all") {
                if (sComp.startsWith("grp:")) {
                    const groupName = sComp.replace("grp:", "");
                    const grp = COMPANY_GROUPS[groupName] || [];
                    rawFiltered = rawFiltered.filter(s => grp.some(c => matchValue(s.company, c)) || matchValue(s.company, groupName));
                    filterLabels.push("会社: "+groupName);
                    penaltyValues.push(35);
                } else {
                    rawFiltered = rawFiltered.filter(s => matchValue(s.company, sComp));
                    filterLabels.push("会社: "+sComp);
                    penaltyValues.push(20);
                }
            }

            const selectedComps = splitParam(sComps);
            if (selectedComps.length > 0) {
                rawFiltered = rawFiltered.filter(s => selectedComps.some(c => matchValue(s.company, c)));
                filterLabels.push("会社: "+Array.from(new Set(selectedComps)).join('・'));
                penaltyValues.push(20);
            }

            const selectedLines = [...splitParam(sLine), ...splitParam(sLines)];
            if (selectedLines.length > 0) {
                const uniqueLines = Array.from(new Set(selectedLines));
                rawFiltered = rawFiltered.filter(s => uniqueLines.some(l => matchValue(s.line, l)));
                filterLabels.push("路線: "+uniqueLines.join('・'));
                penaltyValues.push(10);
            }

            const allowedKeys = new Set(rawFiltered.map(stationKey));
            filtered = allUniqueStations.filter(s => allowedKeys.has(stationKey(s)));

            if (penaltyValues.length > 0) {
                maxDistancePenalty = Math.min(...penaltyValues);
                activeFilters = filterLabels.join(" / ");
            } else {
                maxDistancePenalty = 50;
                activeFilters = "全国";
            }

            for(let i=filtered.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [filtered[i],filtered[j]]=[filtered[j],filtered[i]]; }
            gameStations = filtered.slice(0, parseInt(params.get('num')) || 10);
            if (gameStations.length === 0) { alert("駅が見つかりませんでした。"); location.href = "index.html"; return; }
            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function updateDatalist() {
            const val = document.getElementById('station-input').value.toLowerCase(), dl = document.getElementById('station-list');
            if (val.length < 1) { dl.innerHTML = ""; return; }
            const frag = document.createDocumentFragment(); let count = 0;
            for (const label of allStationLabels) { if (label.toLowerCase().startsWith(val)) { const o = document.createElement('option'); o.value = label; frag.appendChild(o); if (++count >= 100) break; } }
            dl.innerHTML = ""; dl.appendChild(frag);
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) { showFinalResult(); return; }
            answered = false; usedHints = { pref: false, line: false };
            document.getElementById('answer-btn').style.display = "block"; document.getElementById('next-btn').style.display = "none";
            document.getElementById('result').innerText = ""; 
            document.getElementById('station-input').value = "";
            document.getElementById('station-list').innerHTML = ""; 
            document.getElementById('hint-area').style.display = "none"; document.getElementById('hint-area').innerText = ""; currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${gameStations.length} 問`;
            startTime = Date.now();
        }

        function showHint(t) {
            if(!answered){
                usedHints[t] = true; const a = document.getElementById('hint-area'); a.style.display = "block";
                const content = t === 'pref' ? `都道府県: ${currentStation.pref}` : `路線名: ${currentStation.line}`;
                if (!a.innerHTML.includes(content)) a.innerHTML = (a.innerHTML ? a.innerHTML + "<br>" : "") + content;
            }
        }

        function checkAnswer() {
            if (answered) return;
            const userRaw = document.getElementById('station-input').value.trim();
            const userName = userRaw.split(' (')[0];
            const sameNameStations = allUniqueStations.filter(s => s.name === userName);
            
            if (userRaw !== "" && sameNameStations.length > 1 && !userRaw.includes(' (')) {
                const res = document.getElementById('result');
                res.innerHTML = `<span style="color:#FF3B30; font-weight:bold;">同名の駅が複数あります。<br>候補から駅を選択してください。</span>`;
                return;
            }

            const time = (Date.now() - startTime) / 1000;
            let baseScore = 0, timeBonus = 0, dist = 999, isCorrect = false;
            
            let userStation = allUniqueStations.find(s => s.fullLabel === userRaw);
            if (!userStation && userRaw !== "") {
                userStation = sameNameStations.find(s => s.lat === currentStation.lat && s.lng === currentStation.lng) || sameNameStations[0];
            }

            if (userStation) {
                dist = getDistance(currentStation.lat, currentStation.lng, userStation.lat, userStation.lng);
                const isNameMatch = (userName === currentStation.name);
                if ((isNameMatch && dist < 1.0) || dist < 0.1) {
                    isCorrect = true;
                }
            }

            if (isCorrect) {
                baseScore = 1500;
                timeBonus = Math.max(0, 500 - (Math.max(0, time - 10) * 10));
            } else {
                baseScore = Math.max(0, 1000 * (1 - Math.sqrt(Math.min(dist, maxDistancePenalty) / maxDistancePenalty)));
            }

            let multiplier = 1.0;
            if (usedHints.pref && usedHints.line) multiplier = 0.1; else if (usedHints.line) multiplier = 0.25; else if (usedHints.pref) multiplier = 0.5;
            const questionScore = Math.round((baseScore + timeBonus) * multiplier); totalScore += questionScore;

            const res = document.getElementById('result');
            res.innerHTML = `<div style="font-size:12px; color:#555;">あなたの解答: ${userRaw || "(未入力)"}</div>` +
                            `<span style="color:${isCorrect ? '#D33' : '#007AFF'}; font-weight:bold;">${isCorrect ? '正解！' : '不正解（正解は「'+currentStation.name+'」）'}</span>` +
                            `<br><span style="font-size:11px; color:#666;">(${currentStation.pref}/${currentStation.line})</span>` +
                            `<div style="font-size:13px; color:#444; margin-top:5px;">解答時間: <span style="font-weight:bold;">${time.toFixed(1)}秒</span> / 誤差: <span style="font-weight:bold;">${!userRaw ? '-' : dist.toFixed(2) + 'km'}</span></div>` +
                            `<div style="font-size:16px; color:#E60; font-weight:bold; margin-top:2px;">+${questionScore.toLocaleString()}点</div>` +
                            `<div style="font-size:10px; color:#888;">(基礎:${Math.round(baseScore)} + タイム:${Math.round(timeBonus)}) × 倍率:${multiplier}</div>`;

            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, userAns: userRaw || "(未入力)", isCorrect, dist, score: questionScore, time, lat: currentStation.lat, lng: currentStation.lng });
            answered = true; document.getElementById('answer-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block";
            questionCount++;
        }

        function showAnswer() {
            if (answered) return;
            document.getElementById('result').innerHTML = `<span style="color:#FF9500; font-weight:bold;">正解は「${currentStation.name}」</span><br><span style="font-size:11px; color:#666;">(${currentStation.pref}/${currentStation.line})</span><div style="font-size:16px; font-weight:bold; margin-top:5px;">+0点</div>`;
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, userAns: "ギブアップ", isCorrect: false, dist: 999, score: 0, time: 0, lat: currentStation.lat, lng: currentStation.lng });
            answered = true; document.getElementById('answer-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block";
            questionCount++;
        }

        const SCORE_HISTORY_KEY = "sateStaChallengeScoreHistory:v1";
        const SCORE_BEST_PREFIX = "sateStaChallengeBestScore:v1:";

        function confirmExitToTitle() {
            if (confirm("本当に終了してタイトルに戻りますか？")) {
                location.href = "index.html";
            }
        }

        function escapeHtml(str) {
            return String(str ?? "").replace(/[&<>"']/g, (match) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[match]));
        }

        function safeJsonParse(value, fallback) {
            try {
                return value ? JSON.parse(value) : fallback;
            } catch (e) {
                return fallback;
            }
        }

        function getCurrentConditionKey() {
            const mode = isLocked ? "hard" : "normal";
            const filterKey = activeFilters || "全国";
            return `${mode}|${filterKey}|penalty:${maxDistancePenalty}`;
        }

        function getCurrentConditionLabel(modeName) {
            return `${modeName} / ${activeFilters || "全国"}`;
        }

        function getCorrectCount() {
            return playHistory.filter(h => h.isCorrect).length;
        }

        function getTotalTimeSeconds() {
            const total = playHistory.reduce((sum, h) => sum + (Number(h.time) || 0), 0);
            return Math.round(total * 10) / 10;
        }

        function getBestRecord(conditionKey) {
            return safeJsonParse(localStorage.getItem(SCORE_BEST_PREFIX + conditionKey), null);
        }

        function saveLocalScoreRecord(rank, modeName) {
            const conditionKey = getCurrentConditionKey();
            const result = {
                score: totalScore,
                rank,
                correctCount: getCorrectCount(),
                totalQuestions: playHistory.length,
                totalTime: getTotalTimeSeconds(),
                modeName,
                filters: activeFilters || "全国",
                conditionKey,
                conditionLabel: getCurrentConditionLabel(modeName),
                playedAt: new Date().toISOString()
            };

            const previousBest = getBestRecord(conditionKey);
            const shouldUpdateBest = !previousBest ||
                result.score > previousBest.score ||
                (result.score === previousBest.score && result.totalTime < previousBest.totalTime);

            const conditionBest = shouldUpdateBest ? result : previousBest;
            if (shouldUpdateBest) {
                localStorage.setItem(SCORE_BEST_PREFIX + conditionKey, JSON.stringify(result));
            }

            const history = safeJsonParse(localStorage.getItem(SCORE_HISTORY_KEY), []);
            history.unshift(result);
            const limitedHistory = history.slice(0, 10);
            localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(limitedHistory));

            return {
                result,
                previousBest,
                conditionBest,
                isNewBest: shouldUpdateBest,
                history: limitedHistory
            };
        }

        function formatRecordDate(isoString) {
            try {
                return new Date(isoString).toLocaleString("ja-JP", {
                    month: "2-digit",
                    day: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit"
                });
            } catch (e) {
                return "";
            }
        }

        function createScoreRecordHtml(state) {
            const result = state.result;
            const best = state.conditionBest || result;
            const previousBestText = state.previousBest
                ? `${Number(state.previousBest.score).toLocaleString()}点`
                : "なし";
            const badge = state.isNewBest ? '<span class="new-best-badge">自己ベスト更新！</span>' : "";
            const historyHtml = state.history.length
                ? state.history.map((item) => `
                    <li>
                        ${escapeHtml(formatRecordDate(item.playedAt))}：
                        ${Number(item.score).toLocaleString()}点 / ${escapeHtml(item.rank)}
                        （${Number(item.correctCount)}/${Number(item.totalQuestions)}問・${escapeHtml(item.modeName)}）
                    </li>
                `).join("")
                : '<li>まだ記録がありません</li>';

            return `
                <div id="score-record-area" class="score-record-box">
                    <div class="score-record-title">
                        <span>自己記録</span>
                        ${badge}
                    </div>
                    <div class="score-record-condition">${escapeHtml(result.conditionLabel)}</div>
                    <div class="score-record-grid">
                        <div class="score-record-cell">
                            <span>今回</span>
                            <strong>${Number(result.score).toLocaleString()}点</strong>
                        </div>
                        <div class="score-record-cell">
                            <span>条件別ベスト</span>
                            <strong>${Number(best.score).toLocaleString()}点</strong>
                        </div>
                    </div>
                    <div class="score-record-sub">
                        正答数：${Number(result.correctCount)}/${Number(result.totalQuestions)}問　
                        合計時間：${Number(result.totalTime).toFixed(1)}秒<br>
                        これまでの条件別ベスト：${escapeHtml(previousBestText)}
                    </div>
                    <details class="score-history-details">
                        <summary>最近10回の記録を見る</summary>
                        <ol class="score-history-list">${historyHtml}</ol>
                    </details>
                    <button class="btn-record-reset" onclick="resetScoreRecords()">自己記録をリセット</button>
                </div>`;
        }

        function resetScoreRecords() {
            if (!confirm("自己記録をすべて削除しますか？")) return;

            Object.keys(localStorage).forEach((key) => {
                if (key.startsWith(SCORE_BEST_PREFIX) || key === SCORE_HISTORY_KEY) {
                    localStorage.removeItem(key);
                }
            });

            const area = document.getElementById("score-record-area");
            if (area) {
                area.innerHTML = `
                    <div class="score-record-title">自己記録</div>
                    <div class="score-record-sub">自己記録を削除しました。</div>
                `;
            }
        }

        function copyToClipboard(text) {
            const temp = document.createElement('textarea'); temp.value = text; document.body.appendChild(temp); temp.select();
            document.execCommand('copy'); document.body.removeChild(temp); alert("文章をコピーしました！");
        }

        function showFinalResult(isViewMode = false) {
            document.getElementById('game-ui').style.display = "none"; const modeName = isLocked ? "ハード" : "通常";
            document.getElementById('question-title').innerText = isViewMode ? "リザルト閲覧" : "結果発表";
            const finalUi = document.getElementById('final-ui'); finalUi.style.display = "block";
            const totalMax = playHistory.length * 2000; let rank = "D"; const ratio = totalScore / (totalMax || 1);
            if (ratio >= 0.9) rank = "SSS"; else if (ratio >= 0.8) rank = "SS"; else if (ratio >= 0.7) rank = "S"; else if (ratio >= 0.5) rank = "A"; else if (ratio >= 0.3) rank = "B"; else if (ratio >= 0.1) rank = "C";

            let scoreRecordHtml = "";
            if (!isViewMode) {
                if (!localScoreSaved) {
                    lastScoreRecordState = saveLocalScoreRecord(rank, modeName);
                    localScoreSaved = true;
                }
                if (lastScoreRecordState) {
                    scoreRecordHtml = createScoreRecordHtml(lastScoreRecordState);
                }
            }

            let listH = '<ul class="result-list">';
            playHistory.forEach((h) => {
                const mark = h.isCorrect ? '●' : (h.dist < (maxDistancePenalty*0.1) ? '▲' : '×');
                const markColor = h.isCorrect ? 'red' : (h.dist < (maxDistancePenalty*0.1) ? 'orange' : 'blue');
                listH += `<li class="result-item"><div class="res-status" style="color:${markColor}">${mark}</div><div class="res-info"><span class="res-name">${h.name}</span><span class="res-user-ans">解答: ${h.userAns}</span><span class="res-sub">${h.pref} / ${h.line}</span><span class="res-score-detail">${h.score}pt | 誤差:${(h.userAns === "(未入力)" || h.userAns === "ギブアップ") ? '-' : h.dist.toFixed(1)+'km'} | ${h.time.toFixed(1)}s</span></div><button class="btn-view" onclick="jumpToStation(${h.lat}, ${h.lng})">確認</button></li>`;
            });

            const shareText = `航空写真・駅当てクイズ「サテステ」で ${totalScore.toLocaleString()}点獲得しました！\n#サテステ #鉄道クイズ #地理クイズ https://sate-sta.com`;
            
            finalUi.innerHTML = `
                <div class="final-score">${totalScore.toLocaleString()} 点</div>
                <div class="final-rank">ランク: ${rank}</div>
                ${scoreRecordHtml}
                <div class="sns-share-area">
                    <button class="btn-sns btn-x" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}')">𝕏で投稿</button>
                    <button class="btn-sns btn-line" onclick="window.open('https://line.me/R/msg/text/?${encodeURIComponent(shareText)}')">LINE</button>
                    <button class="btn-sns btn-threads" onclick="window.open('https://www.threads.net/intent/post?text=${encodeURIComponent(shareText)}')">Threads</button>
                    <button class="btn-sns btn-fb" style="background:#555" onclick="copyToClipboard('${shareText}')">文章をコピー</button>
                    <button class="btn-sns btn-insta" onclick="copyToClipboard('${shareText}')">Insta用コピー</button>
                    <button class="btn-sns btn-card" onclick="generateResultCard('${rank}', '${modeName}')">画像で詳細結果をシェア！</button>
                </div>
                ${listH}</ul>
                <div class="result-footer-buttons">
                    ${isViewMode ? '' : '<button class="btn-next" style="background:#34C759; margin:0;" onclick="location.reload()">もう一度</button>'}
                    <button class="btn-reset" style="background:#8E8E93;" onclick="location.href='index.html'">タイトルへ</button>
                </div>`;
            
            setTimeout(() => {
                const ads = finalUi.querySelectorAll('.adsbygoogle');
                ads.forEach(() => refreshAds());
            }, 100);
        }

        async function generateResultCard(rank, modeName, autoShow = false) {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 1450;
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF3B30"; ctx.fillRect(0, 0, canvas.width, 120);
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center"; ctx.fillText("サテステ リザルトカード", 400, 75);
            ctx.fillStyle = "#333333"; ctx.font = "bold 24px sans-serif"; ctx.fillText(`${modeName} / ${activeFilters}`, 400, 170);
            ctx.fillStyle = "#FF3B30"; ctx.font = "bold 140px sans-serif"; ctx.fillText(rank, 400, 310);
            ctx.fillStyle = "#333333"; ctx.font = "bold 50px sans-serif"; ctx.fillText(`${totalScore.toLocaleString()} 点`, 400, 380);
            ctx.strokeStyle = "#eeeeee"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(50, 420); ctx.lineTo(750, 420); ctx.stroke();
            let y = 480;
            playHistory.forEach((h, i) => {
                const mark = h.isCorrect ? '●' : (h.dist < (maxDistancePenalty*0.1) ? '▲' : '×'), markColor = h.isCorrect ? '#D33' : (h.dist < (maxDistancePenalty*0.1) ? '#FF9500' : '#007AFF');
                ctx.textAlign = "left"; ctx.fillStyle = markColor; ctx.font = "bold 30px sans-serif"; ctx.fillText(mark, 50, y);
                ctx.fillStyle = "#333333"; ctx.font = "bold 24px sans-serif"; 
                ctx.fillText(`${i + 1}. ${h.name}`, 95, y, 600); 
                ctx.fillStyle = "#666666"; ctx.font = "18px sans-serif"; 
                ctx.fillText(`解答: ${h.userAns || "(未入力)"}  (${h.pref} / ${h.line})`, 95, y + 30, 650);
                ctx.fillStyle = "#999999"; ctx.font = "16px sans-serif"; 
                ctx.fillText(`誤差: ${(h.userAns === "(未入力)" || h.userAns === "ギブアップ") ? '-' : h.dist.toFixed(2) + 'km'}   タイム: ${h.time.toFixed(1)}s`, 95, y + 55);
                ctx.textAlign = "right"; ctx.fillStyle = "#007AFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText(`${h.score} pt`, 750, y + 15);
                y += 92;
            });
            ctx.fillStyle = "#f8f8f8"; ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = "#999999"; ctx.font = "18px sans-serif"; ctx.textAlign = "center"; ctx.fillText("sate-ste.com | 航空写真から駅当てクイズ「サテステ」", 400, canvas.height - 18);
            const dataUrl = canvas.toDataURL("image/png");
            const container = document.getElementById('share-image-container');
            container.innerHTML = `<img src="${dataUrl}">`;
            document.getElementById('image-overlay').style.display = "flex";
            const shareText = `航空写真・駅当てクイズ「サテステ」で ${totalScore.toLocaleString()}点獲得しました！ #サテステ #鉄道クイズ #地理クイズ https://sate-sta.com`;
            if (navigator.share && !autoShow) {
                const blob = await (await fetch(dataUrl)).blob();
                const file = new File([blob], "result.png", { type: "image/png" });
                const b = document.createElement('button'); b.className="overlay-close"; b.style.background="#007AFF"; b.style.color="white"; b.innerText="画像を直接SNSに送る";
                b.onclick = () => navigator.share({ files: [file], title: 'サテステ', text: shareText });
                container.appendChild(b);
            }
        }
        function closeOverlay() { document.getElementById('image-overlay').style.display = "none"; }
        function jumpToStation(la, ln) { map.flyTo([la, ln], 17); }
        function resetView() { if(currentStation) map.flyTo([currentStation.lat, currentStation.lng], 17); }
        function makeDraggable(el) { if (window.innerWidth <= 600) return; const h = document.getElementById("ui-header"); let p1=0, p2=0, p3=0, p4=0; h.onmousedown = (e) => { e.preventDefault(); p3 = e.clientX; p4 = e.clientY; el.style.transition = "none"; document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; el.style.transition = "transform 0.3s ease"; }; document.onmousemove = (e) => { e.preventDefault(); p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY; el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.bottom = "auto"; }; } }
    </script>
</body>
