<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズプレイ | サテステ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .ui-container { 
            position: absolute; bottom: 20px; left: 20px; z-index: 10; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            padding: 0; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.3); 
            width: 320px; max-height: 85vh; display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ui-header { background: #007AFF; color: white; padding: 12px; cursor: pointer; font-size: 12px; text-align: center; border-top-left-radius: 12px; border-top-right-radius: 12px; user-select: none; flex-shrink: 0; font-weight: bold; }
        .ui-content { padding: 15px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }

        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
        input { padding: 12px; font-size: 16px; width: 100%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; }
        button:active { opacity: 0.7; }
        
        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 15px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; font-size: 15px; }
        .btn-hint   { background: #5856D6; font-size: 10px; }

        /* SNS共有ボタンエリア */
        .sns-share-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .btn-sns { padding: 10px 0; font-size: 9px; display: flex; align-items: center; justify-content: center; gap: 2px; text-decoration: none; }
        .btn-x { background: #000; }
        .btn-line { background: #06C755; }
        .btn-threads { background: #000; border: 1px solid #333; }
        .btn-fb { background: #1877F2; }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .btn-tiktok { background: #000; border-left: 2px solid #ff0050; border-right: 2px solid #00f2ea; }
        
        #hint-area { margin-top: 10px; font-size: 12px; color: #444; background: #f0f0f0; border-radius: 6px; padding: 10px; display: none; border-left: 4px solid #5856D6; }
        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; min-height: 1.5em; line-height: 1.4; }

        .result-list { list-style: none; padding: 0; margin: 10px 0; }
        .result-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .res-info { flex-grow: 1; margin-left: 10px; text-align: left; }
        .res-name { font-weight: bold; color: #333; display: block; font-size: 13px; }
        .res-sub { font-size: 10px; color: #777; display: block; }
        .res-time-label { font-size: 10px; color: #007AFF; font-weight: bold; }
        .res-status { width: 25px; text-align: center; font-size: 16px; }
        .btn-view { background: #5ac8fa; padding: 6px 10px; font-size: 11px; width: auto; }
        .final-score { font-size: 24px; color: #d33; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .total-time-display { font-size: 14px; color: #333; text-align: center; margin-bottom: 15px; padding: 5px; border-bottom: 1px solid #eee; }
        .result-footer-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .result-footer-buttons button { flex: 1; padding: 15px 5px; }

        .ad-box { background: #fdfdfd; border: 1px solid #eee; padding: 10px; text-align: center; font-size: 10px; color: #999; margin: 10px 0; }

        @media (max-width: 600px) {
            .ui-container { width: 100%; left: 0; bottom: 0; border-radius: 20px 20px 0 0; max-height: 75vh; }
            .ui-container.minimized { transform: translateY(calc(100% - 45px)); }
            .ui-header { padding: 14px; font-size: 13px; }
            .ui-header::after { content: ' (タップで地図を広く見る)'; font-weight: normal; font-size: 10px; opacity: 0.8; }
        }
    </style>
</head>
<body onload="init()">

    <div id="map"></div>

    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header" onclick="togglePanel()">サテステ</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">準備中...</h2>
            
            <div id="game-ui">
                <input list="station-list" id="station-input" placeholder="駅名を入力..." autocomplete="off">
                <datalist id="station-list"></datalist>
                
                <div class="button-group">
                    <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                    <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                    <button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
                    <button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
                    <button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
                    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>
                </div>
                <div id="hint-area"></div>
                <div id="result"></div>
                <div class="ad-box">スポンサーリンク</div>
            </div>

            <div id="final-ui" style="display:none;"></div>
        </div>
    </div>

    <script>
        let gameStations = [], currentStation = null, map, score = 0, questionCount = 0, totalQuestions = 10, answered = false, playHistory = [], startTime = 0, isLocked = false;
        
        function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        function togglePanel() { if (window.innerWidth <= 600) document.getElementById('ui-panel').classList.toggle('minimized'); }
        function expandPanel() { document.getElementById('ui-panel').classList.remove('minimized'); }

        function init() {
            const params = new URLSearchParams(window.location.search);
            isLocked = params.get('lock') === 'true';
            map = L.map('map', { zoomControl:false, dragging:!isLocked, touchZoom:!isLocked, doubleClickZoom:!isLocked, scrollWheelZoom:!isLocked, boxZoom:!isLocked, keyboard:!isLocked });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '&copy; 国土地理院' }).addTo(map);
            if (typeof stations === 'undefined') return;
            totalQuestions = parseInt(params.get('num')) || 10;
            
            let filtered = [...stations];
            const mPrefs = params.get('prefs') ? params.get('prefs').split(',') : null;
            const sPref = params.get('pref');
            if (mPrefs) filtered = filtered.filter(s => mPrefs.includes(s.pref));
            else if (sPref && sPref !== "all") {
                if (sPref.startsWith("reg:")) {
                    const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
                    const reg = REGION_PREFS[sPref.replace("reg:", "")] || [];
                    filtered = filtered.filter(s => reg.includes(s.pref));
                } else filtered = filtered.filter(s => s.pref === sPref);
            }
            const mComps = params.get('comps') ? params.get('comps').split(',') : null;
            const sComp = params.get('company');
            if (mComps) filtered = filtered.filter(s => mComps.includes(s.company));
            else if (sComp && sComp !== "all") {
