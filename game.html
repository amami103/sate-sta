<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズプレイ | サテステ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* 操作パネルの基本デザイン */
        .ui-container { 
            position: absolute; bottom: 20px; left: 20px; z-index: 10; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            padding: 0; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.3); 
            width: 320px; max-height: 85vh; display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ui-header { 
            background: #007AFF; color: white; padding: 12px; 
            cursor: pointer; font-size: 12px; text-align: center; 
            border-top-left-radius: 12px; border-top-right-radius: 12px; 
            user-select: none; flex-shrink: 0; font-weight: bold;
        }
        .ui-content { padding: 15px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }

        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
        input { padding: 12px; font-size: 16px; width: 100%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; transition: background 0.2s; }
        button:active { opacity: 0.7; }
        
        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 15px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; font-size: 15px; }
        .btn-hint   { background: #5856D6; font-size: 11px; }
        .btn-x      { background: #000; grid-column: span 2; margin-bottom: 10px; }
        
        #hint-area { margin-top: 10px; font-size: 12px; color: #444; background: #f0f0f0; border-radius: 6px; padding: 10px; display: none; border-left: 4px solid #5856D6; }
        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; min-height: 1.5em; line-height: 1.4; }

        /* リザルト表示用 */
        .result-list { list-style: none; padding: 0; margin: 10px 0; }
        .result-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .res-info { flex-grow: 1; margin-left: 10px; text-align: left; }
        .res-name { font-weight: bold; color: #333; display: block; font-size: 13px; }
        .res-sub { font-size: 10px; color: #777; display: block; }
        .res-time-label { font-size: 10px; color: #007AFF; font-weight: bold; }
        .res-status { width: 25px; text-align: center; font-size: 16px; }
        .btn-view { background: #5ac8fa; padding: 6px 10px; font-size: 11px; width: auto; }
        .final-score { font-size: 22px; color: #d33; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .total-time-display { font-size: 14px; color: #333; text-align: center; margin-bottom: 15px; padding: 5px; border-bottom: 2px solid #eee; }
        .result-footer-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .result-footer-buttons button { flex: 1; padding: 15px 5px; }

        /* 広告用スペース */
        .ad-res-box { background: #fff; border: 1px dashed #ccc; padding: 10px; margin-bottom: 15px; text-align: center; font-size: 10px; color: #999; }

        /* スマホ向けレスポンシブ */
        @media (max-width: 600px) {
            .ui-container { width: 100%; left: 0; bottom: 0; border-radius: 20px 20px 0 0; max-height: 70vh; }
            .ui-container.minimized { transform: translateY(calc(100% - 45px)); }
            .ui-header { padding: 14px; font-size: 13px; }
            .ui-header::after { content: ' (タップで開閉)'; font-weight: normal; font-size: 10px; opacity: 0.8; }
        }
    </style>
</head>
<body onload="init()">

    <div id="map"></div>

    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header" onclick="togglePanel()">ここをタップで開閉</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">準備中...</h2>
            
            <!-- ゲーム中UI -->
            <div id="game-ui">
                <input list="station-list" id="station-input" placeholder="駅名を入力..." autocomplete="off">
                <datalist id="station-list"></datalist>
                
                <div class="button-group">
                    <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                    <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                    <button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
                    <button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
                    <button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
                    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>
                </div>
                <div id="hint-area"></div>
                <div id="result"></div>
            </div>

            <!-- リザルトUI（初期非表示） -->
            <div id="final-ui" style="display:none;"></div>
        </div>
    </div>

    <script>
        let gameStations = [], currentStation = null, map, score = 0, questionCount = 0, totalQuestions = 10, answered = false, playHistory = [], startTime = 0, isLocked = false;
        
        const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
        const COMPANY_GROUPS = { "大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道","名古屋鉄道","近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄","西日本鉄道"], "関東大手私鉄": ["東武鉄道","西武鉄道","京成電鉄","京王電鉄","小田急電鉄","東急電鉄","京急電鉄","東京メトロ","相模鉄道"], "関西大手私鉄": ["近畿日本鉄道","南海電鉄","京阪電鉄","阪急電鉄","阪神電鉄"], "地下鉄": ["札幌市交通局","仙台市交通局","東京都交通局","東京メトロ","横浜市交通局","名古屋市交通局","京都市交通局","Osaka Metro","神戸市交通局","福岡市交通局"], "JR": ["JR北海道","JR東日本","JR東海","JR西日本","JR四国","JR九州"]};

        function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        function togglePanel() { if (window.innerWidth <= 600) document.getElementById('ui-panel').classList.toggle('minimized'); }
        function expandPanel() { document.getElementById('ui-panel').classList.remove('minimized'); }

        function init() {
            const params = new URLSearchParams(window.location.search);
            isLocked = params.get('lock') === 'true';
            map = L.map('map', { zoomControl:false, dragging:!isLocked, touchZoom:!isLocked, doubleClickZoom:!isLocked, scrollWheelZoom:!isLocked, boxZoom:!isLocked, keyboard:!isLocked });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '&copy; 国土地理院' }).addTo(map);
            if (typeof stations === 'undefined') return;

            totalQuestions = parseInt(params.get('num')) || 10;
            let filtered = [...stations];

            // フィルタリング
            const mPrefs = params.get('prefs') ? params.get('prefs').split(',') : null;
            const sPref = params.get('pref');
            if (mPrefs) filtered = filtered.filter(s => mPrefs.includes(s.pref));
            else if (sPref && sPref !== "all") {
                if (sPref.startsWith("reg:")) {
                    const reg = REGION_PREFS[sPref.replace("reg:", "")] || [];
                    filtered = filtered.filter(s => reg.includes(s.pref));
                } else filtered = filtered.filter(s => s.pref === sPref);
            }
            const mComps = params.get('comps') ? params.get('comps').split(',') : null;
            const sComp = params.get('company');
            if (mComps) filtered = filtered.filter(s => mComps.includes(s.company));
            else if (sComp && sComp !== "all") {
                if (sComp.startsWith("grp:")) {
                    const grp = COMPANY_GROUPS[sComp.replace("grp:", "")] || [];
                    filtered = filtered.filter(s => grp.includes(s.company));
                } else filtered = filtered.filter(s => s.company === sComp);
            }
            const mLines = params.get('lines') ? params.get('lines').split(',') : null;
            const sLine = params.get('line');
            if (mLines) filtered = filtered.filter(s => mLines.includes(s.line));
            else if (sLine && sLine !== "all") filtered = filtered.filter(s => s.line === sLine);

            if (filtered.length === 0) filtered = [...stations];
            shuffle(filtered);
            gameStations = filtered.slice(0, totalQuestions);
            totalQuestions = gameStations.length;

            const dl = document.getElementById('station-list');
            [...new Set(stations.map(s => s.name))].forEach(n => { const o = document.createElement('option'); o.value = n; dl.appendChild(o); });
            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) { showFinalResult(); return; }
            answered = false;
            document.getElementById('answer-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('result').innerText = "";
            document.getElementById('station-input').value = "";
            document.getElementById('hint-area').style.display = "none";
            currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${totalQuestions} 問`;
            startTime = Date.now();
        }

        function showHint(t) { if(!answered){ const a = document.getElementById('hint-area'); a.style.display = "block"; a.innerText = (t==='pref'?"都道府県: ":"路線名: ")+(currentStation[t]||"不明"); } }
        function resetView() { if(currentStation) map.flyTo([currentStation.lat, currentStation.lng], 17); }

        function checkAnswer() {
            if (answered) return;
            expandPanel();
            const time = (Date.now() - startTime) / 1000;
            const user = document.getElementById('station-input').value;
            const res = document.getElementById('result');
            const isCorrect = (user === currentStation.name);
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;
            if (isCorrect) { res.innerHTML = "<span style='color:#D33;'>正解！</span>" + infoText; score++; }
            else { res.innerHTML = "<span style='color:#007AFF;'>正解は「" + currentStation.name + "」</span>" + infoText; }
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, lat: currentStation.lat, lng: currentStation.lng, isCorrect: isCorrect, time: time });
            finishOne();
        }

        function showAnswer() {
            if (answered) return;
            expandPanel();
            const time = (Date.now() - startTime) / 1000;
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;
            document.getElementById('result').innerHTML = "正解: <span style='color:#E60;'>" + currentStation.name + "</span>" + infoText;
            playHistory.push({ name: currentStation.name, pref: currentStation.pref, line: currentStation.line, lat: currentStation.lat, lng: currentStation.lng, isCorrect: false, time: time });
            finishOne();
        }

        function finishOne() { answered = true; document.getElementById('answer-btn').style.display = "none"; document.getElementById('next-btn').style.display = "block"; questionCount++; }
        function jumpToStation(la, ln) { map.dragging.enable(); map.scrollWheelZoom.enable(); map.flyTo([la, ln], 17); }

        function showFinalResult() {
            expandPanel();
            document.getElementById('game-ui').style.display = "none";
            document.getElementById('question-title').innerText = "結果発表";
            const finalUi = document.getElementById('final-ui');
            finalUi.style.display = "block";

            let totalT = 0, listH = '<ul class="result-list">';
            playHistory.forEach((h) => {
                totalT += h.time;
                const mark = h.isCorrect ? '<span style="color:red;">●</span>' : '<span style="color:blue;">×</span>';
                listH += `<li class="result-item"><div class="res-status">${mark}</div><div class="res-info"><span class="res-name">${h.name}</span><span class="res-sub">${h.pref} / ${h.line}</span><span class="res-time-label">${h.time.toFixed(1)}秒</span></div><button class="btn-view" onclick="jumpToStation(${h.lat}, ${h.lng})">確認</button></li>`;
            });
            const mt = Math.floor(totalT / 60), st = (totalT % 60).toFixed(1);
            const timeStr = mt > 0 ? mt + '分' + st + '秒' : st + '秒';

            const shareText = encodeURIComponent(`航空写真・駅当てクイズ「サテステ」で ${totalQuestions}問中 ${score}問正解しました！\n総解答時間: ${timeStr}\n\n#サテステ #鉄道クイズ #地理クイズ\n`);
            const shareUrl = encodeURIComponent(window.location.origin);

            finalUi.innerHTML = `
                <div class="final-score">${score} / ${totalQuestions} 問正解！</div>
                <div class="total-time-display">総解答時間: ${timeStr}</div>
                <button class="btn-x" onclick="window.open('https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}')">𝕏 で結果をシェアする</button>
                <div class="ad-res-box">スポンサーリンク</div>
                <p style="font-size:10px; color:#777; text-align:center;">「確認」で地図を移動できます</p>
                ${listH + '</ul>'}
                <div class="result-footer-buttons">
                    <button class="btn-next" style="margin:0;" onclick="location.reload()">もう一度</button>
                    <button class="btn-reset" onclick="location.href='index.html'">タイトル</button>
                </div>
            `;
        }

        function makeDraggable(el) {
            if (window.innerWidth <= 600) return;
            const h = document.getElementById("ui-header");
            let p1=0, p2=0, p3=0, p4=0;
            h.onmousedown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.bottom = "auto";
                };
            }
        }
    </script>
</body>
</html>
