<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空写真・駅当てクイズ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .ui-container { 
            position: absolute; bottom: 20px; left: 20px; z-index: 10; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); 
            padding: 0; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 320px; max-height: 85vh; display: flex; flex-direction: column;
        }
        
        .ui-header { background: rgba(0, 0, 0, 0.1); padding: 10px; cursor: move; font-size: 12px; text-align: center; border-top-left-radius: 12px; border-top-right-radius: 12px; user-select: none; flex-shrink: 0; }
        .ui-content { padding: 15px; overflow-y: auto; flex-grow: 1; }

        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
        input { padding: 10px; font-size: 16px; width: 100%; border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.4; cursor: default; }

        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 14px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; }
        .btn-hint   { background: #5856D6; font-size: 10px; }
        
        #hint-area { margin-top: 10px; font-size: 12px; color: #444; background: #f0f0f0; border-radius: 6px; padding: 8px; display: none; border-left: 4px solid #5856D6; }
        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; min-height: 1.5em; line-height: 1.4; }

        /* リザルト用スタイル */
        .result-list { list-style: none; padding: 0; margin: 10px 0; }
        .result-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 13px; 
        }
        .result-item:last-child { border-bottom: none; }
        .res-info { flex-grow: 1; margin-left: 10px; text-align: left; }
        .res-name { font-weight: bold; color: #333; }
        .res-sub { font-size: 10px; color: #777; margin-top: 2px; }
        .res-status { width: 25px; text-align: center; font-size: 16px; }
        .btn-view { background: #5ac8fa; padding: 5px 8px; font-size: 10px; width: auto; flex-shrink: 0; }
        .final-score { font-size: 22px; color: #d33; font-weight: bold; text-align: center; margin: 15px 0; }
    </style>
</head>
<body onload="init()">

    <div id="map"></div>

    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header">ここを掴んで移動</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">準備中...</h2>
            <div id="game-ui">
                <input list="station-list" id="station-input" placeholder="駅名を入力...">
                <datalist id="station-list"></datalist>
                
                <div class="button-group">
                    <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                    <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                    <button class="btn-giveup" onclick="showAnswer()">答えを見る</button>
                    <button class="btn-hint" onclick="showHint('pref')">ヒント: 県</button>
                    <button class="btn-hint" onclick="showHint('line')">ヒント: 路線</button>
                    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">次の駅へ</button>
                </div>
                <div id="hint-area"></div>
                <div id="result"></div>
            </div>
            <div id="final-ui" style="display:none;"></div>
        </div>
    </div>

    <script>
        let gameStations = [];
        let currentStation = null;
        let map, score = 0, questionCount = 0, totalQuestions = 10, answered = false;
        let playHistory = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            map = L.map('map', { zoomControl: false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
                attribution: '&copy; 国土地理院'
            }).addTo(map);

            if (typeof stations === 'undefined') {
                alert("stations.jsが読み込めません");
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            totalQuestions = parseInt(urlParams.get('num')) || 10;
            const fPref = urlParams.get('pref');
            const fComp = urlParams.get('company');
            const fLine = urlParams.get('line');

            let filtered = [...stations];
            if (fPref && fPref !== "all") filtered = filtered.filter(s => s.pref === fPref);
            if (fComp && fComp !== "all") filtered = filtered.filter(s => s.company === fComp);
            if (fLine && fLine !== "all") filtered = filtered.filter(s => s.line === fLine);

            if (filtered.length === 0) {
                alert("条件に合う駅がありません。全駅から出題します。");
                filtered = [...stations];
            }

            shuffle(filtered);
            gameStations = filtered.slice(0, totalQuestions);
            totalQuestions = gameStations.length;

            const list = document.getElementById('station-list');
            const uniqueNames = [...new Set(stations.map(s => s.name))];
            uniqueNames.forEach(name => {
                const op = document.createElement('option');
                op.value = name;
                list.appendChild(op);
            });

            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) {
                showFinalResult();
                return;
            }
            
            answered = false;
            document.getElementById('answer-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('result').innerText = "";
            document.getElementById('station-input').value = "";
            document.getElementById('hint-area').style.display = "none";
            
            currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${totalQuestions} 問`;
        }

        function showHint(type) {
            if (answered) return;
            const area = document.getElementById('hint-area');
            area.style.display = "block";
            area.innerText = (type === 'pref' ? "都道府県: " : "路線名: ") + (currentStation[type] || "不明");
        }

        function resetView() {
            if (currentStation) map.flyTo([currentStation.lat, currentStation.lng], 17);
        }

        function checkAnswer() {
            if (answered) return;
            const user = document.getElementById('station-input').value;
            const res = document.getElementById('result');
            const isCorrect = (user === currentStation.name);
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;

            if (isCorrect) {
                res.innerHTML = "<span style='color:#D33;'>正解！</span>" + infoText;
                score++;
            } else {
                res.innerHTML = "<span style='color:#007AFF;'>正解は「" + currentStation.name + "」</span>" + infoText;
            }
            
            saveHistory(isCorrect);
            finishOne();
        }

        function showAnswer() {
            if (answered) return;
            const infoText = `<br><span style="font-size: 11px; color: #666; font-weight: normal;">（${currentStation.pref} / ${currentStation.line}）</span>`;
            document.getElementById('result').innerHTML = "正解: <span style='color:#E60;'>" + currentStation.name + "</span>" + infoText;
            
            saveHistory(false);
            finishOne();
        }

        function saveHistory(isCorrect) {
            playHistory.push({
                name: currentStation.name,
                pref: currentStation.pref,
                line: currentStation.line,
                lat: currentStation.lat,
                lng: currentStation.lng,
                isCorrect: isCorrect
            });
        }

        function finishOne() {
            answered = true;
            document.getElementById('answer-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            questionCount++;
        }

        function jumpToStation(lat, lng) {
            map.flyTo([lat, lng], 17);
        }

        function showFinalResult() {
            document.getElementById('game-ui').style.display = "none";
            document.getElementById('question-title').innerText = "結果発表";
            
            const finalUi = document.getElementById('final-ui');
            finalUi.style.display = "block";

            let listHtml = '<ul class="result-list">';
            playHistory.forEach((h) => {
                const mark = h.isCorrect ? '<span style="color:red;">●</span>' : '<span style="color:blue;">×</span>';
                listHtml += `
                    <li class="result-item">
                        <div class="res-status">${mark}</div>
                        <div class="res-info">
                            <div class="res-name">${h.name}</div>
                            <div class="res-sub">${h.pref} / ${h.line}</div>
                        </div>
                        <button class="btn-view" onclick="jumpToStation(${h.lat}, ${h.lng})">確認</button>
                    </li>`;
            });
            listHtml += '</ul>';

            finalUi.innerHTML = `
                <div class="final-score">${score} / ${totalQuestions} 問正解！</div>
                <p style="font-size:10px; color:#777; text-align:center;">「確認」で地図を移動できます</p>
                ${listHtml}
                <button class="btn-next" onclick="location.href='index.html'">タイトルに戻る</button>
            `;
        }

        function makeDraggable(el) {
            const header = document.getElementById("ui-header");
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            header.onmousedown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.bottom = "auto";
                };
            }
        }
    </script>
</body>
</html>
