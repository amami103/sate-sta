<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空写真・駅当てクイズ (ヒント機能付き)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stations.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background-color: #eee; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .ui-container { 
            position: absolute; bottom: 20px; left: 20px; z-index: 10; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); 
            padding: 0; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 320px; min-height: 150px; overflow: hidden; resize: both;
        }

        .ui-header { background: rgba(0, 0, 0, 0.05); padding: 8px; cursor: move; font-size: 11px; text-align: center; border-top-left-radius: 12px; border-top-right-radius: 12px; user-select: none; color: #666; }
        .ui-content { padding: 15px; }

        h2 { margin: 0 0 10px 0; font-size: 14px; color: #333; text-align: center; }
        input { padding: 10px; font-size: 16px; width: 100%; border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { padding: 10px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }

        .btn-answer { background: #007AFF; grid-column: span 2; font-size: 14px; }
        .btn-reset  { background: #8E8E93; }
        .btn-giveup { background: #FF9500; }
        
        /* ヒントボタンのスタイル */
        .btn-hint   { background: #5856D6; font-size: 11px; } 
        
        .btn-next   { background: #34C759; grid-column: span 2; margin-top: 5px; }

        /* ヒント表示エリア */
        #hint-area { 
            margin: 10px 0 0 0; padding: 8px; border-radius: 6px; 
            background: rgba(88, 86, 214, 0.1); color: #444; 
            font-size: 12px; display: none; border-left: 4px solid #5856D6;
        }

        #result { margin-top: 10px; font-size: 14px; font-weight: bold; text-align: center; line-height: 1.4; min-height: 3em; }
        .info-sub { font-size: 11px; color: #666; font-weight: normal; display: block; margin-top: 2px; }
        
        .final-score { font-size: 24px; color: #E44; margin: 10px 0; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div id="map"></div>

    <div class="ui-container" id="ui-panel">
        <div class="ui-header" id="ui-header">ここを掴んで移動</div>
        <div class="ui-content" id="ui-content">
            <h2 id="question-title">読み込み中...</h2>
            
            <input list="station-list" id="station-input" placeholder="駅名を入力...">
            <datalist id="station-list"></datalist>
            
            <div class="button-group" id="normal-buttons">
                <button class="btn-answer" id="answer-btn" onclick="checkAnswer()">回答する</button>
                <button class="btn-reset" onclick="resetView()">場所を戻す</button>
                <button class="btn-giveup" id="giveup-btn" onclick="showAnswer()">答えを見る</button>
                
                <!-- ヒントボタン -->
                <button class="btn-hint" id="hint-pref-btn" onclick="showHint('pref')">都道府県ヒント</button>
                <button class="btn-hint" id="hint-line-btn" onclick="showHint('line')">路線名ヒント</button>

                <button class="btn-next" id="next-btn" onclick="nextQuestion()">次の駅へ</button>
            </div>

            <!-- ヒント表示 -->
            <div id="hint-area"></div>
            
            <!-- 結果表示（ここに駅名＋都道府県＋路線が出る） -->
            <div id="result"></div>
        </div>
    </div>


    <script>
        let gameStations = [];
        let currentStation = null;
        let map;
        let score = 0;
        let questionCount = 0;
        let totalQuestions = 10;
        let answered = false;

        const urlParams = new URLSearchParams(window.location.search);
        const numParam = urlParams.get('num');
        if (numParam) totalQuestions = parseInt(numParam);

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            map = L.map('map', { zoomControl: false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
                attribution: '&copy; 国土地理院'
            }).addTo(map);

            if (typeof stations === 'undefined') {
                alert("stations.jsが読み込めていません。");
                return;
            }

            const allStationsCopy = [...stations]; 
            shuffle(allStationsCopy);
            gameStations = allStationsCopy.slice(0, totalQuestions);

            const list = document.getElementById('station-list');
            stations.forEach(s => {
                const option = document.createElement('option');
                option.value = s.name;
                list.appendChild(option);
            });

            nextQuestion();
            makeDraggable(document.getElementById("ui-panel"));
        }

        function nextQuestion() {
            if (questionCount >= gameStations.length) {
                showFinalResult();
                return;
            }
            
            answered = false;
            // UIリセット
            document.getElementById('answer-btn').disabled = false;
            document.getElementById('answer-btn').style.opacity = "1";
            document.getElementById('giveup-btn').disabled = false;
            document.getElementById('giveup-btn').style.opacity = "1";
            document.getElementById('result').innerHTML = "";
            document.getElementById('station-input').value = "";
            document.getElementById('hint-area').style.display = "none";
            document.getElementById('hint-area').innerText = "";
            
            currentStation = gameStations[questionCount];
            map.setView([currentStation.lat, currentStation.lng], 17);
            
            document.getElementById('question-title').innerText = `第 ${questionCount + 1} 問 / 全 ${totalQuestions} 問`;
        }

        // ヒント表示ロジック
        function showHint(type) {
            if (answered) return;
            const hintArea = document.getElementById('hint-area');
            hintArea.style.display = "block";

            if (type === 'pref') {
                const pref = currentStation.pref || "情報なし";
                hintArea.innerText = "【ヒント】都道府県: " + pref;
            } else if (type === 'line') {
                const line = currentStation.line || "情報なし";
                hintArea.innerText = "【ヒント】路線名: " + line;
            }
        }

        function resetView() {
            if (currentStation && map) map.flyTo([currentStation.lat, currentStation.lng], 17);
        }

        function checkAnswer() {
            if (answered) return;
            const userAnswer = document.getElementById('station-input').value;
            const resultDiv = document.getElementById('result');
            
            // 追加情報の組み立て
            const pref = currentStation.pref || "不明";
            const line = currentStation.line || "不明";
            const infoHtml = `<span class="info-sub">（${pref} / ${line}）</span>`;

            if (userAnswer === currentStation.name) {
                resultDiv.innerHTML = `<span style='color:#D33;'>正解！</span><br>${currentStation.name}${infoHtml}`;
                score++;
            } else {
                resultDiv.innerHTML = `<span style='color:#007AFF;'>残念！ 正解は「${currentStation.name}」</span><br>${infoHtml}`;
            }
            
            finishOneQuestion();
        }

        function showAnswer() {
            if (answered) return;
            const resultDiv = document.getElementById('result');
            const pref = currentStation.pref || "不明";
            const line = currentStation.line || "不明";
            const infoHtml = `<span class="info-sub">（${pref} / ${line}）</span>`;

            resultDiv.innerHTML = `正解: <span style='color:#E60;'>${currentStation.name}</span><br>${infoHtml}`;
            finishOneQuestion();
        }

        function finishOneQuestion() {
            answered = true;
            document.getElementById('answer-btn').disabled = true;
            document.getElementById('answer-btn').style.opacity = "0.5";
            document.getElementById('giveup-btn').disabled = true;
            document.getElementById('giveup-btn').style.opacity = "0.5";
            questionCount++;
        }

        function showFinalResult() {
            const content = document.getElementById('ui-content');
            content.innerHTML = `
                <h2>結果発表</h2>
                <div class="final-score">${score} / ${totalQuestions} 問正解！</div>
                <button class="btn-next" onclick="location.reload()">もう一度遊ぶ</button>
                <button class="btn-reset" style="width:100%; margin-top:5px;" onclick="location.href='index.html'">タイトルに戻る</button>
            `;
        }

        function makeDraggable(el) {
            const header = document.getElementById("ui-header");
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            header.onmousedown = dragMouseDown;
            function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px"; el.style.bottom = "auto"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }
    </script>
</body>
</html>
