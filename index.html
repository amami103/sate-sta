<script>
        const prefOrder = ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","朝倉市","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
        const REGION_PREFS = { "北海道地方": ["北海道"],"東北地方": ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],"関東地方": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],"中部地方": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],"近畿地方": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],"中国地方": ["鳥取県", "島根県", "岡山県", "広島県", "山口県"],"四国地方": ["徳島県", "香川県", "愛媛県", "高知県"],"九州地方": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]};
        
        let masterCompanies = [], masterLines = [];

        window.onload = function() {
            if (typeof stations === 'undefined') return;
            const existingPrefs = new Set(stations.map(s => s.pref));
            
            // 修正箇所：路線名や会社名が「,」や「・」で結合されている場合に分割して抽出するように変更
            masterCompanies = [...new Set(stations.flatMap(s => s.company ? s.company.split(/[,、・\/]/).map(x => x.trim()) : []))].filter(Boolean).sort();
            masterLines = [...new Set(stations.flatMap(s => s.line ? s.line.split(/[,、・\/]/).map(x => x.trim()) : []))].filter(Boolean).sort();

            ["c", "f"].forEach(mode => {
                const ps = document.getElementById(`pref-select-${mode}`);
                ps.innerHTML += `<option disabled>---------- 地方 ----------</option>`;
                Object.keys(REGION_PREFS).forEach(reg => ps.add(new Option("・" + reg, "reg:" + reg)));
                ps.innerHTML += `<option disabled>---------- 都道府県 ----------</option>`;
                prefOrder.forEach(p => { if (existingPrefs.has(p)) ps.add(new Option(p, p)); });
                fillSelect(`company-select-${mode}`, masterCompanies, "すべての会社", mode === "c" || mode === "f" ? "grp" : "");
                fillSelect(`line-select-${mode}`, masterLines, "すべての路線");
            });

            const prefChecks = document.getElementById("pref-checks");
            prefOrder.forEach(p => { if (existingPrefs.has(p)) prefChecks.innerHTML += `<label class="check-item"><input type="checkbox" name="c-pref" value="${p}">${p}</label>`; });
            masterCompanies.forEach(c => document.getElementById("company-checks").innerHTML += `<label class="check-item"><input type="checkbox" name="c-comp" value="${c}">${c}</label>`);
            masterLines.forEach(l => document.getElementById("line-checks").innerHTML += `<label class="check-item" title="${l}"><input type="checkbox" name="c-line" value="${l}">${l}</label>`);
        };

        function fillSelect(id, items, defaultText, type="") {
            const select = document.getElementById(id);
            select.innerHTML = `<option value="all">${defaultText}</option>`;
            if(type === "grp") {
                select.innerHTML += `<option value="grp:大手私鉄">・大手私鉄</option><option value="grp:JR">・JR</option><option disabled>----------</option>`;
            }
            items.forEach(item => select.add(new Option(item, item)));
        }

        function filterSelect(id, query, mode) {
            const items = (id.includes("company")) ? masterCompanies : masterLines;
            const filtered = items.filter(item => item.includes(query));
            fillSelect(id, filtered, (id.includes("company") ? "すべての会社" : "すべての路線"), (id.includes("company") ? "grp" : ""));
        }

        function filterCheckboxes(containerId, query) {
            document.getElementById(containerId).querySelectorAll('.check-item').forEach(label => {
                label.style.display = label.textContent.includes(query) ? "flex" : "none";
            });
        }

        function clearChecks(id) {
            document.getElementById(id).querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        }

        function toggleCustom() {
            const area = document.getElementById("custom-area");
            area.style.display = (area.style.display === "block") ? "none" : "block";
            document.getElementById("normal-settings-f").style.opacity = (area.style.display === "block") ? "0.3" : "1";
        }

        function startGame(targetHtml, modeSuffix) {
            const num = (modeSuffix === 'c') ? 10 : (document.getElementById(`num-input-${modeSuffix}`).value || 10);
            const lock = document.getElementById(`map-lock-${modeSuffix}`).checked;
            let url = targetHtml + "?num=" + num;
            if (modeSuffix === 'f' && document.getElementById("custom-area").style.display === "block") {
                const selPrefs = Array.from(document.querySelectorAll('input[name="c-pref"]:checked')).map(el => el.value);
                const selComps = Array.from(document.querySelectorAll('input[name="c-comp"]:checked')).map(el => el.value);
                const selLines = Array.from(document.querySelectorAll('input[name="c-line"]:checked')).map(el => el.value);
                if (selPrefs.length > 0) url += "&prefs=" + encodeURIComponent(selPrefs.join(','));
                if (selComps.length > 0) url += "&comps=" + encodeURIComponent(selComps.join(','));
                if (selLines.length > 0) url += "&lines=" + encodeURIComponent(selLines.join(','));
            } else {
                const p = document.getElementById(`pref-select-${modeSuffix}`).value;
                const c = document.getElementById(`company-select-${modeSuffix}`).value;
                const l = document.getElementById(`line-select-${modeSuffix}`).value;
                if (p !== "all") url += "&pref=" + encodeURIComponent(p);
                if (c !== "all") url += "&company=" + encodeURIComponent(c);
                if (l !== "all") url += "&line=" + encodeURIComponent(l);
            }
            if (lock) url += "&lock=true";
            window.location.href = url;
        }
    </script>
